server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.thehelper.ca; frame-ancestors 'none';" always;

    # === API proxy → same-host bridge to the Wasp server. ===
    # The web SPA is built with REACT_APP_API_URL=https://thehelper.ca
    # (same-origin), so the browser hits /api, /auth, and /operations on
    # this nginx. Without these proxy blocks, those paths would 404 against
    # the SPA and every useQuery / manual fetch would JSON.parse the
    # <!DOCTYPE html> index and throw "Unexpected token '<'". DO NOT REMOVE.
    #
    # The api container is reachable as `thehelper-api` on the shared
    # `coolify` docker network (see docker-compose.yml).
    location ~ ^/(api|auth|operations)/ {
        proxy_pass http://thehelper-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # React SPA — serve index.html for all routes (client-side routing)
    # Tell Cloudflare and CDNs never to cache index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header CDN-Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
