name: Playwright E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: test
        run: |
          sudo service postgresql start
          sleep 3
          sudo -u postgres psql -c "CREATE DATABASE worki_test;" 2>/dev/null || true
          sudo -u postgres psql -c "CREATE USER worki WITH PASSWORD 'worki_test';" 2>/dev/null || true
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE worki_test TO worki;" 2>/dev/null || true
          sudo -u postgres psql -c "ALTER DATABASE worki_test OWNER TO worki;" 2>/dev/null || true
          npx wasp db migrate-dev 2>&1 || true
          npx wasp start &
          sleep 15
          curl -f http://localhost:3000 || { echo "Server not ready"; exit 1; }

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          DATABASE_URL: postgres://worki:worki_test@localhost:5432/worki_test
          NODE_ENV: test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
