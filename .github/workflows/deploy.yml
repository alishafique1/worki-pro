name: Deploy to Production VPS

# Manual-trigger only for now — pushing to main does NOT auto-deploy.
# Run from the Actions tab → "Deploy to Production VPS" → Run workflow,
# or: gh workflow run deploy.yml --ref main
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install Wasp CLI
        run: npm i -g @wasp.sh/wasp-cli@0.21.1 @wasp.sh/wasp-cli-linux-x64-glibc@0.21.1

      - name: Build Wasp (generates .wasp/out/ + web-app source)
        run: wasp build

      - name: Install workspace deps (web-app workspace now exists)
        run: npm install

      - name: Build React SPA
        env:
          REACT_APP_API_URL: https://api.thehelper.ca
          # Public PostHog project key (phc_…) for the shared Social-Dots project.
          # Safe to expose — it ships in the client bundle. Inlined by Vite at build time.
          REACT_APP_POSTHOG_KEY: phc_AxYiacGAymmuaa2cRPMZASTbXRMsiKtdzKv9BiaELZrj
        run: npx vite build --outDir deploy/dist

      - name: Commit build artifacts to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/dist .wasp/out/
          git diff --staged --quiet || git commit -m "build: update deploy/dist + .wasp/out [skip ci]"
          git push origin main

      # The production VPS only accepts SSH over Tailscale (firewall + fail2ban
      # whitelist the tailnet; public port 22 is unreachable from GitHub runners).
      # This step joins the runner to the tailnet so the SSH step below can reach
      # the VPS at its Tailscale address (set VPS_HOST to e.g. vps.zebu-mirzam.ts.net
      # or 100.102.25.87). Requires a Tailscale OAuth client with tag:ci.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Validate SSH secret is configured
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ERROR: VPS_SSH_KEY secret is not set. Go to repo Settings > Secrets > Actions and add it."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "ERROR: VPS_HOST secret is not set."
            exit 1
          fi
          echo "SSH secrets present. Proceeding with deploy to ${{ secrets.VPS_HOST }}."

      - name: Free disk space and deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          debug: true
          script: |
            set -e
            echo "=== Pruning unused Docker images/cache ==="
            docker system prune -af
            echo "=== Pulling latest code ==="
            cd /data/thehelper
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "=== Building Docker images ==="
            docker compose build --no-cache
            echo "=== Restarting containers ==="
            docker compose up -d
            echo "=== Applying DB migrations (NOT automatic via docker — must run explicitly) ==="
            docker exec -w /app/.wasp/out/db thehelper-api npx prisma migrate deploy
            echo "=== Deploy complete ==="
            docker ps

      - name: Purge Cloudflare cache
        if: ${{ env.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -o '"success":[a-z]*'
