name: Deploy to Production VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install Wasp CLI
        run: npm i -g @wasp.sh/wasp-cli@0.21.1 @wasp.sh/wasp-cli-linux-x64-glibc@0.21.1

      - name: Build Wasp (generates .wasp/out/ + web-app source)
        run: wasp build

      - name: Install workspace deps (web-app workspace now exists)
        run: npm install

      - name: Build React SPA
        env:
          REACT_APP_API_URL: https://api.thehelper.ca
        run: npx vite build --outDir deploy/dist

      - name: Commit updated deploy/dist to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/dist
          git diff --staged --quiet || git commit -m "build: update deploy/dist [skip ci]"
          git push origin main

      - name: Free disk space and deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            echo "=== Pruning unused Docker images/cache ==="
            docker system prune -af
            echo "=== Pulling latest code ==="
            cd /data/thehelper
            git pull origin main
            echo "=== Building Docker images ==="
            docker compose build --no-cache
            echo "=== Restarting containers ==="
            docker compose up -d
            echo "=== Deploy complete ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep thehelper
