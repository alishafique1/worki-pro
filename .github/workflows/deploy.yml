name: Deploy to Production VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install Wasp CLI
        run: npm i -g @wasp.sh/wasp-cli@0.21.1 @wasp.sh/wasp-cli-linux-x64-glibc@0.21.1

      - name: Build Wasp (generates .wasp/out/ + web-app source)
        run: wasp build

      - name: Install workspace deps (web-app workspace now exists)
        run: npm install

      - name: Build React SPA
        env:
          REACT_APP_API_URL: https://api.thehelper.ca
        run: npx vite build --outDir deploy/dist

      - name: Pull latest code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /data/thehelper
            echo "=== Pulling latest code ==="
            git pull origin main

      - name: Upload fresh frontend build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/dist"
          target: "/data/thehelper"

      - name: Build images and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            cd /data/thehelper
            echo "=== Building Docker images ==="
            docker compose build --no-cache
            echo "=== Restarting containers ==="
            docker compose up -d
            echo "=== Deploy complete ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep thehelper
