name: Execute Implementation Plan

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: 'Path to the plan file'
        required: false
        default: 'docs/superpowers/plans/2026-05-19-bark-style-redesign.md'
      task_number:
        description: 'Specific task number (leave empty to auto-pick next pending)'
        required: false
        default: ''

jobs:
  execute-plan:
    name: Execute next plan task
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check for pending tasks
        id: check
        run: |
          PLAN="${{ github.event.inputs.plan_file }}"
          PENDING=$(grep -c '^\- \[ \]' "$PLAN" 2>/dev/null || echo "0")
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "plan=$PLAN" >> $GITHUB_OUTPUT
          echo "Pending tasks: $PENDING"

      - name: Execute next task
        if: steps.check.outputs.pending != '0'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          node scripts/execute-task.mjs \
            "${{ steps.check.outputs.plan }}" \
            "${{ github.event.inputs.task_number }}"

      - name: All tasks done
        if: steps.check.outputs.pending == '0'
        run: echo "✅ All tasks complete — nothing to do."

      - name: Check remaining and re-trigger
        if: steps.check.outputs.pending != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN="${{ steps.check.outputs.plan }}"
          REMAINING=$(grep -c '^\- \[ \]' "$PLAN" 2>/dev/null || echo "0")
          echo "Remaining after this run: $REMAINING"
          if [ "$REMAINING" -gt "0" ]; then
            echo "🔄 Triggering next task run..."
            gh workflow run execute-plan.yml \
              --field plan_file="$PLAN" \
              --field task_number=""
          else
            echo "🎉 All tasks complete!"
            gh issue comment 68 \
              --body "✅ All tasks in \`$PLAN\` are complete — implementation finished." \
              2>/dev/null || true
          fi
