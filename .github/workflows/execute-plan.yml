name: Execute Implementation Plan

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: 'Path to the plan file (relative to repo root)'
        required: false
        default: 'docs/superpowers/plans/2026-05-19-bark-style-redesign.md'

jobs:
  execute-plan:
    name: Run agent loop on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Trigger agent loop on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 55m
          script: |
            set -e

            REPO_DIR="/opt/worki-pro"
            PLAN="${{ github.event.inputs.plan_file }}"

            # Clone repo if it doesn't exist yet
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Cloning repo to $REPO_DIR..."
              git clone git@github.com:$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]').git "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            # Pull latest
            git pull origin main --ff-only || git fetch origin && git reset --hard origin/main

            # Make the script executable
            chmod +x scripts/run-agent-loop.sh

            # Run the agent loop
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              bash scripts/run-agent-loop.sh "$PLAN"
