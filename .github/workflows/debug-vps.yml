name: Debug VPS state

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check containers and index.html on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Running containers ==="
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            echo ""
            echo "=== deploy/dist/index.html on VPS filesystem ==="
            cat /data/thehelper/deploy/dist/index.html | grep -o '"[^"]*\.js"'
            echo ""
            echo "=== index.html inside the running thehelper-web container ==="
            docker exec thehelper-web cat /usr/share/nginx/html/index.html | grep -o '"[^"]*\.js"'
            echo ""
            echo "=== Assets inside running thehelper-web container ==="
            docker exec thehelper-web ls /usr/share/nginx/html/assets/
