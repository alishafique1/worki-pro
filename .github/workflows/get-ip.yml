name: Get VPS IP
on:
  workflow_dispatch:
jobs:
  ip:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "IPv4:"; curl -4s ifconfig.me 2>/dev/null || echo "no IPv4"
            echo "IPv6:"; curl -6s ifconfig.me 2>/dev/null || echo "no IPv6"
