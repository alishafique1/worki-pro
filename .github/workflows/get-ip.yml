name: Get VPS IP
on:
  workflow_dispatch:
jobs:
  ip:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Firewall ==="
            ufw status 2>/dev/null || echo "ufw not active"
            echo "=== Listening on 80/443 ==="
            ss -tlnp | grep -E ":80 |:443 "
            echo "=== Traefik ports ==="
            docker inspect coolify-proxy --format '{{json .NetworkSettings.Ports}}'
            echo "=== thehelper-web reachable from Traefik? ==="
            docker exec coolify-proxy wget -qO- --header="Host: thehelper.ca" http://thehelper-web 2>/dev/null | grep -o '"[^"]*\.js"' || echo "not reachable"
