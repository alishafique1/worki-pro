<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Helper">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="amber" x1="41" y1="25" x2="54" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#tile)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>

  <!-- Chimney (behind roof) -->
  <rect x="38.2" y="20" width="4.2" height="10" rx="1" fill="#ffffff" fill-opacity="0.92"/>

  <!-- Roof -->
  <path d="M13.5 35 L31 19 L48.5 35 Z" fill="#ffffff"/>
  <!-- House body with door -->
  <path d="M18 33 L31 21 L44 33 L44 47 C44 48.1 43.1 49 42 49 L36 49 L36 39.6 C36 38.7 35.3 38 34.4 38 L27.6 38 C26.7 38 26 38.7 26 39.6 L26 49 L20 49 C18.9 49 18 48.1 18 47 Z" fill="#ffffff"/>
  <circle cx="33.6" cy="44" r="1.1" fill="#2563EB"/>

  <!-- Amber growth arrow (single warm accent) -->
  <path d="M41.2 26 L52.6 15.4 M46.6 14.2 L53.8 14.2 L53.8 21.2"
        fill="none" stroke="url(#amber)" stroke-width="3.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
